<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Peso</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(160px, 1fr));
        gap: 0.8rem;
        margin-bottom: 1.5rem;
      }
      label {
        display: flex;
        flex-direction: column;
        font-size: 0.95rem;
      }
      input,
      button {
        padding: 0.5rem;
        font-size: 1rem;
      }
      button {
        grid-column: 1 / -1;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 0.6rem;
        text-align: left;
      }
      th {
        background: #f3f3f3;
      }
    </style>
  </head>
  <body>
    <h1>Registro de peso</h1>

    <form method="post" action="{{ url_for('registrar_peso') }}">
      <label>
        Nombre
        <input type="text" name="nombre" placeholder="Ej: Ana" required />
      </label>

      <label>
        Peso (kg)
        <input type="number" step="0.1" min="0.1" name="peso" placeholder="Ej: 72.4" required />
      </label>

      <label>
        Fecha
        <input type="date" name="fecha" />
      </label>

      <button type="submit">Guardar registro</button>
    </form>

    <h2>Historial</h2>
    {% if registros %}
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Peso (kg)</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>
        {% for registro in registros|reverse %}
        <tr>
          <td>{{ registro.nombre }}</td>
          <td>{{ '%.1f'|format(registro.peso) }}</td>
          <td>{{ registro.fecha }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p>No hay registros todavía.</p>
    {% endif %}
  </body>
</html>
