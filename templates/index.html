<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Peso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <h1>Registro de peso</h1>

    <form method="post" action="{{ url_for('registrar_peso') }}">
      <label>
        Nombre
        <input type="text" name="nombre" placeholder="Ej: Ana" required />
      </label>

      <label>
        Peso (kg)
        <input type="number" step="0.1" min="0.1" name="peso" placeholder="Ej: 72.4" required />
      </label>

      <label>
        Fecha
        <input type="date" name="fecha" />
      </label>

      <button type="submit">Guardar registro</button>
    </form>

    <h2>Recuperar registros</h2>
    <form method="get" action="{{ url_for('inicio') }}">
      <label>
        Buscar por nombre
        <input type="text" name="nombre" placeholder="Ej: Ana" value="{{ nombre_busqueda }}" />
      </label>
      <button type="submit">Buscar</button>
    </form>

<!--ap 
 <p class="api-links">
      API completa:
      <a href="{{ url_for('api_registros') }}">{{ url_for('api_registros') }}</a>
      {% if nombre_busqueda %}
      | API por nombre:
      <a href="{{ url_for('api_registros_por_nombre', nombre=nombre_busqueda) }}"
        >{{ url_for('api_registros_por_nombre', nombre=nombre_busqueda) }}</a
      >
      {% endif %}
    </p>
-->
    <h2>Historial</h2>
    {% if registros %}
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Peso (kg)</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>
        {% for registro in registros|reverse %}
        <tr>
          <td>{{ registro.nombre }}</td>
          <td>{{ '%.1f'|format(registro.peso) }}</td>
          <td>{{ registro.fecha }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p>No hay registros todavía.</p>
    {% endif %}
  </body>
</html>
